<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AdBlock Detector Bypasser</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="logo-area">
        <div class="logo-pulse"></div>
        <span class="logo-text">Detector Bypass</span>
      </div>
      <span class="version">v1.1.0</span>
    </div>
    
    <div class="divider"></div>

    <div class="status-container">
      <div class="status-info">
        <span class="status-label">우회 보호 상태</span>
        <span id="status-text" class="status-value active">활성화됨</span>
      </div>
      <label class="switch">
        <input type="checkbox" id="bypass-toggle" checked>
        <span class="slider round"></span>
      </label>
    </div>

    <div class="domain-container">
      <div class="domain-info">
        <span class="domain-label">현재 사이트 예외 (우회 끄기)</span>
        <span id="current-domain" class="domain-value">로딩 중...</span>
      </div>
      <label class="switch">
        <input type="checkbox" id="domain-toggle">
        <span class="slider round"></span>
      </label>
    </div>

    <div class="info-box">
      <p class="description">
        광고 차단 프로그램을 감지하여 컨텐츠를 제한하는 사이트들의 감지 패턴을 무력화합니다.
      </p>
      <div class="tips">
        <span class="tip-icon">💡</span>
        <span class="tip-text">설정을 변경한 후에는 변경한 탭을 <strong>새로고침(F5)</strong>해주세요.</span>
      </div>
    </div>

    <div class="footer">
      <span>Designed by Antigravity AI</span>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
